name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'resume-backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}  
          
      - name: Debug - List files
        run: |
          pwd
          ls -la 
          ls -la resume-backend/ || echo "resume-backend NOT FOUND"
          
      - name: Build Docker image
        run: |
          cd resume-backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/pdf-server:latest .

      - name: Push to DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/pdf-server:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull sriharshareddy6464/pdf-server:latest
            docker rm -f pdf-server || true
            docker run -d \
              --name pdf-server \
              --restart always \
              -p 3001:3001 \
              sriharshareddy6464/pdf-server:latest
            docker ps
